<!DOCTYPE html>
<html>
<head>
  <title>Prédiction Web</title>
</head>
<body>
  <h1>Application de Prédiction</h1>
  <input id="inputX" type="number" placeholder="Entrez une valeur">
  <button onclick="predict()">Prédire</button>
  <p id="result"></p>

  <script>
    async function predict() {
      const x = document.getElementById("inputX").value;
      const response = await fetch("https://appdeploy-awyw.onrender.com/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({x: Number(x)})
  });


      const data = await response.json();
      document.getElementById("result").innerText = "Résultat : " + data.prediction;
    }
  </script>
</body>
</html>
